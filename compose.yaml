name: bookstack
services:
  wiki_db:
    container_name: wiki_db
    image: mysql:5.7
    env_file: .env
    restart: always
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
    # ports:
    #   - 3306:3306
    volumes:
      - ./database/data:/var/lib/mysql
    networks:
      - wiki_network
    extra_hosts:
      - host.docker.internal:host-gateway

  wiki_app:
    container_name: wiki_app
    image: solidnerd/bookstack:25.2
    env_file: .env
    depends_on:
      - wiki_db
    restart: always
    environment:
      - DB_HOST=wiki_db:3306
      - APP_LANG=es_AR
      - APP_THEME=custom
      # - ALLOWED_IFRAME_HOSTS="*"
      # - ALLOWED_IFRAME_SOURCES="*"
    ports:
      - ${WIKI_PORT}:8080
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./bookstack/public/uploads:/var/www/bookstack/public/uploads
      - ./bookstack/storage/uploads:/var/www/bookstack/storage/uploads
      - ./bookstack/logs:/var/www/bookstack/storage/logs
      - ./themes:/var/www/bookstack/themes
      # Apache config
      - ./apache.conf:/etc/apache2/sites-available/000-default.conf:ro
    networks:
      - wiki_network
    extra_hosts:
      - host.docker.internal:host-gateway

  wiki_rag:
    container_name: wiki_rag
    build: ./rag
    env_file: .env
    restart: always
    depends_on:
      - wiki_db
    environment:
      - DB_HOST=wiki_db
    ports:
      - ${RAG_PORT:-8090}:8090
    volumes:
      - ./rag/data:/app/data
    networks:
      - wiki_network

networks:
  wiki_network:
    driver: bridge
